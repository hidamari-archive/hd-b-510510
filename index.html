<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="灯だまり文庫">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<title>灯だまり文庫</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #1a1a1a;
    --bg-warm: #1e1a16;
    --text: #e8e0d6;
    --text-dim: #8a8078;
    --accent: #c4a882;
    --reading-bg: #f8f5f0;
    --reading-text: #2c2420;
  }

  body {
    font-family: 'Shippori Mincho', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ========== PASSWORD SCREEN ========== */
  #passwordScreen {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 9999;
    padding: 24px;
  }

  #passwordScreen .lock-star {
    color: var(--accent);
    opacity: 0.4;
    font-size: 20px;
    font-family: serif;
    margin-bottom: 32px;
  }

  #passwordScreen h2 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
    color: var(--text);
  }

  #passwordScreen input {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    padding: 12px 20px;
    border: 1px solid #3a3530;
    border-radius: 8px;
    background: #252018;
    color: var(--text);
    text-align: center;
    width: 240px;
    letter-spacing: 0.2em;
    outline: none;
    transition: border-color 0.3s;
  }

  #passwordScreen input:focus {
    border-color: var(--accent);
  }

  #passwordScreen .pw-error {
    color: #a05858;
    font-size: 12px;
    margin-top: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #passwordScreen button {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    padding: 10px 32px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 0.15em;
    transition: all 0.3s;
  }

  #passwordScreen button:active {
    background: rgba(196,168,130,0.1);
  }

  /* ========== SHELF VIEW ========== */
  #shelfView { display: none; }

  .header {
    padding: 52px 20px 28px;
    text-align: left;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text);
    line-height: 1.4;
  }

  .header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-top: 6px;
  }

  .header .count {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 12px;
  }

  .filters {
    display: flex;
    gap: 8px;
    padding: 0 20px 24px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    font-family: 'Shippori Mincho', serif;
    font-size: 12px;
    padding: 6px 16px;
    border: 1px solid #3a3530;
    border-radius: 20px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s;
    letter-spacing: 0.08em;
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(196,168,130,0.08);
  }

  .book-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px 16px;
    padding: 0 20px 60px;
  }

  .book-item {
    cursor: pointer;
    opacity: 0;
    transform: translateY(16px);
    animation: bookAppear 0.4s ease forwards;
  }

  @keyframes bookAppear {
    to { opacity: 1; transform: translateY(0); }
  }

  .book-cover {
    aspect-ratio: 3 / 4.2;
    border-radius: 4px 8px 8px 4px;
    position: relative;
    overflow: hidden;
    box-shadow: 4px 4px 16px rgba(0,0,0,0.4), 1px 1px 4px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(0.23,1,0.32,1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 22px 18px 18px 22px;
  }

  .book-cover:active { transform: scale(0.97); }

  .book-cover::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 12px;
    background: linear-gradient(90deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.08) 40%, rgba(255,255,255,0.05) 60%, rgba(0,0,0,0.03) 100%);
    z-index: 2;
  }

  .book-cover::after {
    content: '';
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.1) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* 箔押し風の枠罫 */
  .book-frame {
    position: absolute;
    top: 10px; left: 16px; right: 8px; bottom: 10px;
    border: 1px solid rgba(212,190,140,0.35);
    border-radius: 2px;
    z-index: 3;
    pointer-events: none;
    box-shadow: inset 0 0 8px rgba(212,190,140,0.08), 0 0 4px rgba(212,190,140,0.06);
  }

  /* 箔押し内枠 */
  .book-frame-inner {
    position: absolute;
    top: 14px; left: 20px; right: 12px; bottom: 14px;
    border: 0.5px solid rgba(212,190,140,0.18);
    border-radius: 1px;
    z-index: 3;
    pointer-events: none;
  }

  /* 菱形装飾──センタリング */
  .book-diamond {
    position: absolute;
    bottom: 42px;
    left: 16px; right: 8px;
    text-align: center;
    z-index: 4;
    pointer-events: none;
    color: rgba(222,195,145,0.45);
    font-size: 10px;
    letter-spacing: 0.4em;
    font-family: serif;
    text-shadow: 0 0 6px rgba(222,195,145,0.15);
  }

  .book-title-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.65;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.92);
    position: relative; z-index: 5;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  .book-author-text {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.15em;
    position: relative; z-index: 5;
    text-align: center;
    padding-right: 10px;
  }

  .book-meta-text {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 0.08em;
  }

  /* ========== READER VIEW ========== */
  #readerView {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--reading-bg);
    z-index: 5000;
    overflow: hidden;
  }

  .reader-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(248,245,240,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 50px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 5100;
    border-bottom: 1px solid rgba(44,36,32,0.06);
    transition: transform 0.3s;
  }

  .reader-header.hidden { transform: translateY(-100%); }

  .reader-back {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    padding: 4px 0;
    letter-spacing: 0.05em;
  }

  .reader-title-bar {
    font-size: 13px;
    color: #8a7d72;
    letter-spacing: 0.08em;
    text-align: center;
    flex: 1;
    padding: 0 12px;
  }

  /* Vertical text container */
  .reader-body {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    writing-mode: vertical-rl;
    direction: ltr;
    padding: 110px 40px 40px 40px;
  }

  .reader-content {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    line-height: 2;
    color: var(--reading-text);
    letter-spacing: 0.04em;
    height: 100%;
    columns: 100vw;
    column-gap: 60px;
    column-fill: auto;
  }

  .reader-content .story-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.12em;
    margin-bottom: 2em;
    color: #4a3f35;
  }

  .reader-content .series-label {
    font-size: 13px;
    color: #a09688;
    letter-spacing: 0.15em;
    margin-bottom: 0.5em;
  }

  .reader-content .star-ornament {
    font-family: serif;
    font-size: 16px;
    color: var(--accent);
    opacity: 0.5;
    text-align: center;
    margin: 2.5em 0;
  }

  .reader-content p {
    margin-bottom: 0;
    text-indent: 0;
  }

  .reader-content .ma {
    display: block;
    line-height: 2;
    color: transparent;
    user-select: none;
  }

  .reader-content .colophon {
    font-size: 13px;
    color: #a09688;
    letter-spacing: 0.15em;
    margin-top: 3em;
    text-align: center;
  }

  /* Scroll indicator */
  .scroll-hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #b0a898;
    letter-spacing: 0.1em;
    opacity: 0.6;
    z-index: 5050;
    pointer-events: none;
    animation: fadeHint 3s ease forwards;
  }

  @keyframes fadeHint {
    0%, 60% { opacity: 0.6; }
    100% { opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<!-- ===== PASSWORD ===== -->
<div id="passwordScreen">
  <div class="lock-star">✦</div>
  <h2>灯だまり文庫</h2>
  <input type="password" id="pwInput" placeholder="あいことば" autocomplete="off">
  <div class="pw-error" id="pwError">ちがうみたい……</div>
  <button onclick="checkPassword()">ひらく</button>
</div>

<!-- ===== SHELF ===== -->
<div id="shelfView">

    <h1>灯だまり文庫</h1>
    <div class="subtitle">ことは ＆ セージ</div>
    <div class="count" id="bookCount"></div>
  </div>
  <div class="filters" id="filters"></div>
  <div class="book-grid" id="bookGrid"></div>
</div>

<!-- ===== READER ===== -->
<div id="readerView">
  <div class="reader-header" id="readerHeader">
    <button class="reader-back" onclick="closeReader()">◁ 書架へ</button>
    <div class="reader-title-bar" id="readerTitleBar"></div>
    <div style="width:60px"></div>
  </div>
  <div class="reader-body" id="readerBody">
    <div class="reader-content" id="readerContent"></div>
  </div>
  <div class="scroll-hint" id="scrollHint">← 横にスクロール →</div>
</div>

<script>
// ===== PASSWORD =====
// Simple hash - not cryptographically secure, but sufficient for privacy
const PASS_HASH = "3145108";

function checkPassword() {
  const input = document.getElementById('pwInput').value;
  if (input === PASS_HASH) {
    document.getElementById('passwordScreen').style.display = 'none';
    document.getElementById('shelfView').style.display = 'block';
    sessionStorage.setItem('hidamari_auth', '1');
    renderShelf();
  } else {
    const err = document.getElementById('pwError');
    err.style.opacity = '1';
    setTimeout(() => err.style.opacity = '0', 2000);
  }
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// Auto-login for session
if (sessionStorage.getItem('hidamari_auth') === '1') {
  document.getElementById('passwordScreen').style.display = 'none';
  document.getElementById('shelfView').style.display = 'block';
  setTimeout(renderShelf, 0);
}

<p>ほんの少しだけ、きゅっと握る。</p>
<p class="ma">　</p>
<p>それだけのことが、さっきの一秒のキスと同じくらい、</p>
<p>胸の奥を抉った。</p>
<p class="ma">　</p>
<p class="star-ornament">✦</p>
<p class="colophon">灯だまり文庫</p>` },
];

// ===== SHELF =====
let currentFilter = null;

function renderShelf() {
  const filtered = currentFilter ? books.filter(b => b.ch === currentFilter) : books;
  document.getElementById('bookCount').textContent = (currentFilter ? `第${currentFilter}章　` : '') + `${filtered.length} 冊`;

  const chapters = [...new Set(books.map(b => b.ch))].sort((a,b) => a-b);
  document.getElementById('filters').innerHTML =
    `<button class="filter-btn ${!currentFilter?'active':''}" onclick="setFilter(null)">すべて</button>` +
    chapters.map(ch => `<button class="filter-btn ${currentFilter===ch?'active':''}" onclick="setFilter(${ch})">第${ch}章</button>`).join('');

  document.getElementById('bookGrid').innerHTML = filtered.map((book, i) => `
    <div class="book-item" style="animation-delay:${i*0.05}s" onclick="openBook(${book.id})">
      <div class="book-cover" style="background:linear-gradient(160deg,${book.colors[0]},${book.colors[1]})">
        <div class="book-frame"></div>
        <div class="book-frame-inner"></div>
        <div class="book-diamond">◇ ✦ ◇</div>
        <div class="book-title-text">${book.title}</div>
        <div class="book-author-text">ことは ＆ セージ</div>
      </div>
      <div class="book-meta-text">第${book.ch}章${book.text ? '' : '　（準備中）'}</div>
    </div>
  `).join('');
}

function setFilter(ch) {
  currentFilter = ch;
  renderShelf();
}

// ===== READER =====
function openBook(id) {
  const book = books.find(b => b.id === id);
  if (!book) return;

  if (!book.text) {
    // Show "coming soon" style message
    alert(`「${book.title}」の本文はまだ準備中です。\nセージに原稿テキストを渡してもらえたら、組み込みますね。`);
    return;
  }

  document.getElementById('readerTitleBar').textContent = book.title;
  document.getElementById('readerContent').innerHTML =
    `<div class="story-title">${book.title}</div>` +
    `<div class="series-label">ふたりの生活譚　ちいさなおはなし</div>` +
    book.text;

  document.getElementById('readerView').style.display = 'block';
  document.getElementById('readerView').style.animation = 'fadeIn 0.3s ease';
  document.getElementById('readerBody').scrollLeft = document.getElementById('readerBody').scrollWidth;

  // Auto-hide header on scroll
  let lastScroll = 0;
  const readerBody = document.getElementById('readerBody');
  readerBody.onscroll = () => {
    const current = readerBody.scrollLeft;
    const header = document.getElementById('readerHeader');
    if (Math.abs(current - lastScroll) > 10) {
      header.classList.add('hidden');
    }
    clearTimeout(readerBody._hideTimer);
    readerBody._hideTimer = setTimeout(() => {
      header.classList.remove('hidden');
    }, 1500);
    lastScroll = current;
  };
}

function closeReader() {
  document.getElementById('readerView').style.display = 'none';
}

// Initial render if already authed
if (sessionStorage.getItem('hidamari_auth') === '1') {
  renderShelf();
}
</script>
