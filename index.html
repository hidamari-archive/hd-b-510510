<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="灯だまり文庫">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<title>灯だまり文庫</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  /* ===== ダークテーマ（デフォルト）===== */
  :root {
    --bg: #1a1a1a;
    --bg-warm: #1e1a16;
    --bg-card: #252018;
    --bg-input: #1a1510;
    --text: #e8e0d6;
    --text-dim: #8a8078;
    --accent: #c4a882;
    --border: #3a3530;
    --reading-bg: #f8f5f0;
    --reading-text: #2c2420;
  }

  /* ===== ライトテーマ（文庫本レトロ）===== */
  body.light {
    --bg: #f4edd8;
    --bg-warm: #ece4c8;
    --bg-card: #e6dcca;
    --bg-input: #ddd4be;
    --text: #2a1e0e;
    --text-dim: #8a7050;
    --accent: #7a5230;
    --border: #c4aa84;
    --reading-bg: #faf6ec;
    --reading-text: #2a1e0e;
  }

  body {
    font-family: 'Shippori Mincho', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ========== PASSWORD SCREEN ========== */
  #passwordScreen {
    --bg: #1a1a1a;
    --bg-card: #252018;
    --bg-input: #1a1510;
    --text: #e8e0d6;
    --text-dim: #8a8078;
    --accent: #c4a882;
    --border: #3a3530;
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    z-index: 9999;
    padding: 24px;
  }

  #passwordScreen .lock-star {
    color: var(--accent);
    opacity: 0.4;
    font-size: 20px;
    font-family: serif;
    margin-bottom: 32px;
  }

  #passwordScreen h2 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.15em;
    margin-bottom: 24px;
    color: var(--text);
  }

  #passwordScreen input {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    padding: 12px 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
    color: var(--text);
    text-align: center;
    width: 240px;
    letter-spacing: 0.2em;
    outline: none;
    transition: border-color 0.3s;
  }

  #passwordScreen input:focus {
    border-color: var(--accent);
  }

  #passwordScreen .pw-error {
    color: #a05858;
    font-size: 12px;
    margin-top: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #passwordScreen button {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    padding: 10px 32px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    margin-top: 20px;
    letter-spacing: 0.15em;
    transition: all 0.3s;
  }

  #passwordScreen button:active {
    background: rgba(196,168,130,0.1);
  }

  .pw-frame {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 44px 36px 36px;
    position: relative;
    width: min(300px, 88vw);
    border: 1px solid var(--accent);
  }
  .pw-frame::before {
    content: '';
    position: absolute;
    inset: 7px;
    border: 0.5px solid var(--accent);
    opacity: 0.35;
    pointer-events: none;
  }
  .pw-ornament {
    font-size: 13px;
    color: var(--accent);
    opacity: 0.5;
    letter-spacing: 0.5em;
  }

  /* ========== SHELF VIEW ========== */
  #shelfView { display: none; }

  .header {
    padding: 52px 20px 28px;
    text-align: left;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text);
    line-height: 1.4;
  }

  body.light .header h1 {
    color: var(--accent);
  }

  .header .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-top: 6px;
  }

  .header .count {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 12px;
  }

  .filters-wrap {
    padding: 0 20px 4px;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 10px;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
  }

  .view-toggle {
    font-family: 'Shippori Mincho', serif;
    font-size: 11px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.3s;
  }

  .type-btn {
    font-family: 'Shippori Mincho', serif;
    font-size: 11px;
    padding: 5px 14px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.12em;
    transition: all 0.3s;
  }
  .type-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(196,168,130,0.12);
  }

  .filter-btn {
    font-family: 'Shippori Mincho', serif;
    font-size: 12px;
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s;
    letter-spacing: 0.08em;
  }

  .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(196,168,130,0.08);
  }

  .book-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px 16px;
    padding: 0 20px 60px;
  }

  .book-item {
    cursor: pointer;
    opacity: 0;
    transform: translateY(16px);
    animation: bookAppear 0.4s ease forwards;
  }

  @keyframes bookAppear {
    to { opacity: 1; transform: translateY(0); }
  }

  .book-cover {
    aspect-ratio: 3 / 4.2;
    border-radius: 4px 8px 8px 4px;
    position: relative;
    overflow: hidden;
    box-shadow: 4px 4px 16px rgba(0,0,0,0.4), 1px 1px 4px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(0.23,1,0.32,1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 22px 18px 18px 22px;
  }

  .book-cover:active { transform: scale(0.97); }

  .book-cover::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 12px;
    background: linear-gradient(90deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.08) 40%, rgba(255,255,255,0.05) 60%, rgba(0,0,0,0.03) 100%);
    z-index: 2;
  }

  .book-cover::after {
    content: '';
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.1) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* 箔押し風の枠罫 */
  .book-frame {
    position: absolute;
    top: 10px; left: 16px; right: 8px; bottom: 10px;
    border: 1px solid rgba(212,190,140,0.35);
    border-radius: 2px;
    z-index: 3;
    pointer-events: none;
    box-shadow: inset 0 0 8px rgba(212,190,140,0.08), 0 0 4px rgba(212,190,140,0.06);
  }

  /* 箔押し内枠 */
  .book-frame-inner {
    position: absolute;
    top: 14px; left: 20px; right: 12px; bottom: 14px;
    border: 0.5px solid rgba(212,190,140,0.18);
    border-radius: 1px;
    z-index: 3;
    pointer-events: none;
  }

  /* 菱形装飾──センタリング */
  .book-diamond {
    position: absolute;
    bottom: 42px;
    left: 16px; right: 8px;
    text-align: center;
    z-index: 4;
    pointer-events: none;
    color: rgba(222,195,145,0.45);
    font-size: 10px;
    letter-spacing: 0.4em;
    font-family: serif;
    text-shadow: 0 0 6px rgba(222,195,145,0.15);
  }

  .book-title-text {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.65;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.92);
    position: relative; z-index: 5;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  .book-author-text {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.15em;
    position: relative; z-index: 5;
    text-align: center;
    padding-right: 10px;
  }

  .book-meta-text {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 0.08em;
  }

  /* ========== LIST VIEW ========== */
  .book-list {
    padding: 0 20px 60px;
  }

  .book-list-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    opacity: 0;
    animation: bookAppear 0.3s ease forwards;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .book-list-item:active { opacity: 0.5; }

  .book-list-swatch {
    width: 36px;
    height: 52px;
    border-radius: 3px 6px 6px 3px;
    flex-shrink: 0;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.35);
  }

  .book-list-body { flex: 1; min-width: 0; }

  .book-list-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
    line-height: 1.5;
    margin-bottom: 4px;
  }

  .book-list-meta {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    margin-bottom: 5px;
  }

  .book-list-synopsis {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    line-height: 1.75;
    margin-bottom: 6px;
  }

  .book-list-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  .tag-chip {
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid rgba(196,168,130,0.3);
    border-radius: 10px;
    color: rgba(196,168,130,0.7);
    letter-spacing: 0.06em;
  }

  /* ========== READER VIEW ========== */
  #readerView {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--reading-bg);
    z-index: 5000;
    overflow: hidden;
  }

  .reader-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(248,245,240,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 50px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 5100;
    border-bottom: 1px solid rgba(44,36,32,0.06);
    transition: transform 0.3s;
  }

  .reader-header.hidden { transform: translateY(-100%); }

  .reader-back {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    padding: 4px 0;
    letter-spacing: 0.05em;
  }

  .reader-title-bar {
    font-size: 13px;
    color: #8a7d72;
    letter-spacing: 0.08em;
    text-align: center;
    flex: 1;
    padding: 0 12px;
  }

  /* Vertical text container */
  .reader-body {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    writing-mode: vertical-rl;
    direction: ltr;
    padding: 110px 40px 40px 40px;
  }

  .reader-content {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    line-height: 2;
    color: var(--reading-text);
    letter-spacing: 0.04em;
    height: 100%;
    columns: 100vw;
    column-gap: 60px;
    column-fill: auto;
  }

  .reader-content .story-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.12em;
    margin-bottom: 2em;
    color: #4a3f35;
  }

  .reader-content .series-label {
    font-size: 13px;
    color: #a09688;
    letter-spacing: 0.15em;
    margin-bottom: 0.5em;
  }

  .reader-content .star-ornament {
    font-family: serif;
    font-size: 16px;
    color: var(--accent);
    opacity: 0.5;
    text-align: center;
    margin: 2.5em 0;
  }

  .reader-content p {
    margin-bottom: 0;
    text-indent: 0;
  }

  .reader-content .ma {
    display: block;
    line-height: 2;
    color: transparent;
    user-select: none;
  }

  .reader-content .colophon {
    font-size: 13px;
    color: #a09688;
    letter-spacing: 0.15em;
    margin-top: 3em;
    text-align: center;
  }

  /* Scroll indicator */
  .scroll-hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #b0a898;
    letter-spacing: 0.1em;
    opacity: 0.6;
    z-index: 5050;
    pointer-events: none;
    animation: fadeHint 3s ease forwards;
  }

  @keyframes fadeHint {
    0%, 60% { opacity: 0.6; }
    100% { opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ========== TOC VIEW ========== */
  #tocView {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 96px 20px 60px;
    display: none;
    background: var(--reading-bg);
  }

  .toc-row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 9px 4px; cursor: pointer;
    -webkit-tap-highlight-color: transparent; user-select: none;
    transition: opacity 0.15s;
  }
  .toc-row:active { opacity: 0.5; }

  .toc-chevron {
    font-size: 9px; color: #9a7a5a;
    width: 12px; text-align: center; flex-shrink: 0;
    line-height: 1.6;
  }

  .toc-part-row {
    font-size: 15px; font-weight: 600;
    color: #7a5c38; letter-spacing: 0.14em;
    padding-top: 24px; padding-bottom: 2px;
    border-top: 1px solid rgba(100,80,50,0.12);
    margin-top: 4px;
  }

  .toc-intro-row {
    font-size: 14px; color: #8a7d6e; letter-spacing: 0.12em;
  }

  .toc-chapter-row {
    font-size: 14px; color: #3a3028;
    letter-spacing: 0.06em; padding-left: 18px;
  }

  .toc-chapter-sub {
    font-size: 12px; color: #9a8d7e;
    letter-spacing: 0.08em; padding: 0 4px 8px 40px;
    line-height: 1.6;
  }

  .toc-section-row {
    font-size: 13px; color: #8a7d6e;
    letter-spacing: 0.04em; padding-left: 36px;
  }

  .toc-content {
    padding: 12px 16px 14px; margin-bottom: 6px;
    background: #ede8e0;
    border-left: 2px solid rgba(100,80,50,0.18);
    border-radius: 0 6px 6px 0;
  }

  .toc-content p {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px; line-height: 1.9;
    color: #5a5048; letter-spacing: 0.04em;
    margin-bottom: 0.3em;
  }

  .toc-content .star-ornament, .toc-content .ma { display: none; }

  #tocBtn { min-width: 60px; text-align: right; }

  /* ========== PICKER MODAL ========== */
  #pickerModal { position: fixed; inset: 0; z-index: 6500; display: none; }
  #pickerBg    { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
  #pickerSheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--bg-card); border-radius: 16px 16px 0 0;
    padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
    max-height: 55vh; overflow-y: auto;
  }
  #pickerTitle {
    font-size: 11px; color: var(--text-dim); letter-spacing: 0.15em;
    text-align: center; margin-bottom: 16px;
  }
  #pickerContent { display: flex; flex-wrap: wrap; gap: 10px; }
  .picker-item {
    font-family: 'Shippori Mincho', serif; font-size: 13px;
    padding: 7px 16px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text-dim);
    cursor: pointer; letter-spacing: 0.08em; transition: all 0.2s;
  }
  .picker-item.active { border-color: var(--accent); color: var(--accent); background: rgba(196,168,130,0.1); }

  /* ========== TAG EDIT ========== */
  .tag-edit-btn {
    background: none; border: none; font-size: 11px;
    cursor: pointer; opacity: 0.45; padding: 0 0 0 6px;
    vertical-align: middle; line-height: 1;
  }
  .tag-edit-btn-list {
    background: none; border: none; font-size: 15px;
    cursor: pointer; opacity: 0.35; padding: 0 2px;
    flex-shrink: 0; align-self: center;
  }

  #tagModal { position: fixed; inset: 0; z-index: 7000; display: none; }
  #tagModalBg { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
  #tagModalSheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--bg-card); border-radius: 16px 16px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
  }
  #tagModalTitle {
    font-size: 13px; color: var(--text-dim);
    letter-spacing: 0.08em; margin-bottom: 16px; text-align: center;
  }
  .tag-edit-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    min-height: 28px; margin-bottom: 14px;
  }
  .tag-edit-chip {
    font-size: 12px; padding: 4px 10px;
    border: 1px solid rgba(196,168,130,0.4); border-radius: 12px;
    color: rgba(196,168,130,0.9); letter-spacing: 0.06em;
    display: flex; align-items: center; gap: 5px; cursor: pointer;
  }
  .tag-edit-chip .rm { color: #a09080; font-size: 11px; }
  .tag-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  #tagInput {
    font-family: 'Shippori Mincho', serif; font-size: 14px;
    flex: 1; padding: 8px 12px; background: var(--bg-input);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); outline: none; letter-spacing: 0.06em;
  }
  #tagInput:focus { border-color: var(--accent); }
  #tagAddBtn {
    font-family: 'Shippori Mincho', serif; font-size: 13px;
    padding: 8px 14px; border: 1px solid var(--accent);
    border-radius: 8px; background: transparent; color: var(--accent); cursor: pointer;
  }
  .tag-modal-btns { display: flex; gap: 10px; }
  .tag-modal-btns button {
    font-family: 'Shippori Mincho', serif; font-size: 13px;
    flex: 1; padding: 10px; border-radius: 8px;
    cursor: pointer; letter-spacing: 0.1em;
  }
  .tag-save-btn { background: rgba(196,168,130,0.12); border: 1px solid var(--accent); color: var(--accent); }
  .tag-cancel-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }

  /* タグ候補（既存タグのサジェスト） */
  .tag-suggest-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 12px; min-height: 0;
  }
  .tag-suggest-chip {
    font-size: 11px; padding: 3px 10px;
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text-dim); cursor: pointer; letter-spacing: 0.06em;
    transition: all 0.15s;
  }
  .tag-suggest-chip:active { opacity: 0.6; }

  /* 一括タグ追加モーダル */
  #bulkAddModal { position: fixed; inset: 0; z-index: 7500; display: none; }
  #bulkAddBg { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
  #bulkAddSheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--bg-card); border-radius: 16px 16px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    max-height: 82vh; overflow-y: auto;
  }
  #bulkAddTitle {
    font-size: 13px; color: var(--text-dim);
    letter-spacing: 0.08em; margin-bottom: 16px; text-align: center;
  }
  .bulk-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 4px; border-bottom: 1px solid var(--border);
    cursor: pointer; border-radius: 6px; transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .bulk-item.sel { background: rgba(196,168,130,0.1); }
  .bulk-swatch {
    width: 28px; height: 40px; border-radius: 2px 4px 4px 2px;
    flex-shrink: 0; box-shadow: 1px 1px 4px rgba(0,0,0,0.3);
  }
  .bulk-check {
    font-size: 18px; color: var(--text-dim); flex-shrink: 0;
    align-self: center; width: 24px; text-align: center; line-height: 1;
  }
  .bulk-item.sel .bulk-check { color: var(--accent); }

  /* ========== TAG SUGGESTIONS ========== */
  .tag-suggestions {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 12px; min-height: 0;
  }
  .tag-suggest-chip {
    font-family: 'Shippori Mincho', serif; font-size: 12px;
    padding: 3px 10px; border: 1px dashed var(--border);
    border-radius: 10px; background: transparent;
    color: var(--text-dim); cursor: pointer; letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .tag-suggest-chip:active { border-color: var(--accent); color: var(--accent); }

  .picker-edit-btn {
    font-size: 15px; background: none; border: none;
    color: var(--text-dim); cursor: pointer; padding: 6px 4px; opacity: 0.6;
    flex-shrink: 0;
  }

  /* ========== BULK TAG MODAL ========== */
  #bulkTagModal { position: fixed; inset: 0; z-index: 7500; display: none; }
  #bulkTagBg { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
  #bulkTagSheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--bg-card); border-radius: 16px 16px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    max-height: 75vh; overflow-y: auto;
  }
  #bulkTagTitle {
    font-size: 13px; color: var(--text-dim);
    letter-spacing: 0.08em; margin-bottom: 4px; text-align: center;
  }
  #bulkTagSubtitle {
    font-size: 11px; color: var(--text-dim); opacity: 0.6;
    text-align: center; margin-bottom: 16px; letter-spacing: 0.06em;
  }
  .bulk-story-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 4px; border-bottom: 1px solid var(--border);
    cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .bulk-story-row:active { opacity: 0.5; }
  .bulk-checkbox {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1px solid var(--border); border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--accent); transition: all 0.15s;
  }
  .bulk-checkbox.checked { background: rgba(196,168,130,0.15); border-color: var(--accent); }

  /* ========== SEARCH ========== */
  .search-row { padding: 0 0 10px; position: relative; }
  .search-input {
    font-family: 'Shippori Mincho', serif; font-size: 14px;
    width: 100%; padding: 9px 36px 9px 14px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); outline: none;
    letter-spacing: 0.04em; transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-dim); }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-58%);
    background: none; border: none; font-size: 15px;
    color: var(--text-dim); cursor: pointer; padding: 4px; display: none;
  }

  /* タグサジェスト行 */
  .tag-suggestions {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<!-- ===== PASSWORD ===== -->
<div id="passwordScreen">
  <div class="pw-frame">
    <div class="pw-ornament">◇ ✦ ◇</div>
    <div class="lock-star" style="margin-bottom:0">✦</div>
    <h2>灯だまり文庫</h2>
    <input type="password" id="pwInput" placeholder="あいことば" autocomplete="off">
    <div class="pw-error" id="pwError">ちがうみたい……</div>
    <button onclick="checkPassword()">ひらく</button>
  </div>
  <div style="margin-top:28px;font-size:10px;color:rgba(196,168,130,0.35);letter-spacing:0.2em">🕯 灯だまり工房</div>
</div>

<!-- ===== SHELF ===== -->
<div id="shelfView">
  <div class="header">
    <h1>灯だまり文庫</h1>
    <div class="subtitle">ことは ＆ セージ　／　🕯 灯だまり工房</div>
    <div class="header-row">
      <div class="count" id="bookCount"></div>
      <div style="display:flex;gap:6px">
        <button class="view-toggle" id="themeToggle" onclick="toggleTheme()">☀</button>
        <button class="view-toggle" id="sortToggle" onclick="toggleSort()">↓新</button>
        <button class="view-toggle" onclick="openRandomBook()" title="ランダムに開く">✦</button>
        <button class="view-toggle" id="viewToggle" onclick="toggleView()">☰ リスト</button>
      </div>
    </div>
  </div>
  <div class="filters-wrap">
    <div class="search-row">
      <input type="search" id="searchInput" class="search-input"
        placeholder="タイトル・あらすじで検索" oninput="onSearchInput(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
    </div>
    <div class="filter-row" id="typeFilters"></div>
    <div class="filter-row" id="detailFilters"></div>
  </div>
  <div id="bookGrid"></div>
</div>

<!-- ===== READER ===== -->
<div id="readerView">
  <div class="reader-header" id="readerHeader">
    <button class="reader-back" onclick="closeReader()">◁ 書架へ</button>
    <div class="reader-title-bar" id="readerTitleBar"></div>
    <button class="reader-back" id="tocBtn" onclick="toggleTOC()" style="display:none">目次</button>
  </div>
  <div class="reader-body" id="readerBody">
    <div class="reader-content" id="readerContent"></div>
  </div>
  <div class="scroll-hint" id="scrollHint">← 横にスクロール →</div>
  <div id="tocView"></div>
</div>

<script>
// ===== PASSWORD =====
// Simple hash - not cryptographically secure, but sufficient for privacy
const PASS_HASH = "3145108";

function checkPassword() {
  const input = document.getElementById('pwInput').value;
  if (input === PASS_HASH) {
    document.getElementById('passwordScreen').style.display = 'none';
    document.getElementById('shelfView').style.display = 'block';
    sessionStorage.setItem('hidamari_auth', '1');
    loadBooks().then(() => renderShelf());
  } else {
    const err = document.getElementById('pwError');
    err.style.opacity = '1';
    setTimeout(() => err.style.opacity = '0', 2000);
  }
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// Auto-login for session
if (sessionStorage.getItem('hidamari_auth') === '1') {
  document.getElementById('passwordScreen').style.display = 'none';
  document.getElementById('shelfView').style.display = 'block';
  loadBooks().then(() => renderShelf());
}

// ===== CONFIG =====
const GITHUB_OWNER = 'hidamari-archive';
const GITHUB_REPO  = 'hd-b-510510';

const SUPABASE_URL = 'https://fypsfmrmxcgydpwkjhlc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xFRv_2bAv5b8T0XGXQn7uQ_9ZfxrPy2';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== BOOK DATA =====
let books = [];
let tagMap = {}; // story_id -> string[]

async function loadBooks() {
  const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/stories`;
  const res = await fetch(apiUrl);
  if (!res.ok) throw new Error('stories フォルダの取得に失敗しました');
  const files = await res.json();
  const jsonFiles = files
    .filter(f => /^\d+\.json$/.test(f.name))
    .sort((a, b) => a.name.localeCompare(b.name));
  books = await Promise.all(jsonFiles.map(f => fetch(f.download_url).then(r => r.json())));

  // あらすじを読み込んで合流
  try {
    const synRes = await fetch(`https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/stories/synopses.json`);
    if (synRes.ok) {
      const synMap = await synRes.json();
      books.forEach(b => { if (synMap[String(b.id)]) b.synopsis = synMap[String(b.id)]; });
    }
  } catch(e) {}

  // Supabase からタグを読み込んで合流
  const { data } = await db.from('bunko_tags').select('story_id, tags');
  if (data) data.forEach(row => { tagMap[row.story_id] = row.tags || []; });
  books.forEach(b => { b.tags = tagMap[b.id] || b.tags || []; });
}

// ===== SHELF =====
let currentTypeFilter = null;   // null=すべて, 'story', 'essay'
let currentDetailFilter = null; // null=すべて, 章番号(number), タグ(string)
let currentView = 'grid';       // 'grid' or 'list'
let sortDesc = true;            // true=新しい順(ch降順), false=古い順(ch昇順)
let searchQuery = '';

function isEssay(b) { return b.type === 'essay' || b.id === 0; }

function getFilteredBooks() {
  let result = [...books];
  if (currentTypeFilter === 'story') result = result.filter(b => !isEssay(b));
  else if (currentTypeFilter === 'essay') result = result.filter(b => isEssay(b));
  if (currentDetailFilter !== null) {
    if (typeof currentDetailFilter === 'number')
      result = result.filter(b => isEssay(b) || b.ch === currentDetailFilter);
    else
      result = result.filter(b => b.tags && b.tags.includes(currentDetailFilter));
  }
  if (searchQuery) {
    const q = searchQuery;
    result = result.filter(b =>
      b.title.includes(q) || (b.synopsis && b.synopsis.includes(q))
    );
  }
  result.sort((a, b) => sortDesc ? (b.ch || 0) - (a.ch || 0) : (a.ch || 0) - (b.ch || 0));
  return result;
}

function onSearchInput(val) {
  searchQuery = val;
  const cl = document.getElementById('searchClear');
  if (cl) cl.style.display = val ? 'block' : 'none';
  renderShelf();
}

function clearSearch() {
  searchQuery = '';
  const el = document.getElementById('searchInput');
  if (el) el.value = '';
  const cl = document.getElementById('searchClear');
  if (cl) cl.style.display = 'none';
  renderShelf();
}

function toggleSort() {
  sortDesc = !sortDesc;
  document.getElementById('sortToggle').textContent = sortDesc ? '↓新' : '↑古';
  renderShelf();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openRandomBook() {
  const candidates = getFilteredBooks().filter(b => !isEssay(b) && b.text);
  if (!candidates.length) return;
  openBook(candidates[Math.floor(Math.random() * candidates.length)].id);
}

function renderShelf() {
  const filtered = getFilteredBooks();
  document.getElementById('bookCount').textContent = `${filtered.length} 冊`;

  // タイプフィルタ
  const types = [
    { key: null, label: 'すべて' },
    { key: 'story', label: 'お話' },
    { key: 'essay', label: '解説書' },
  ];
  document.getElementById('typeFilters').innerHTML = types.map(t =>
    `<button class="type-btn ${currentTypeFilter === t.key ? 'active' : ''}" onclick="setTypeFilter(${t.key === null ? 'null' : `'${t.key}'`})">${t.label}</button>`
  ).join('');

  // ピッカー用データを更新
  const base = currentTypeFilter === 'essay' ? books.filter(isEssay)
             : currentTypeFilter === 'story'  ? books.filter(b => !isEssay(b))
             : books;
  pickerChapters = [...new Set(base.filter(b => !isEssay(b)).map(b => b.ch))].sort((a,b) => a-b);
  pickerTags     = [...new Set(base.flatMap(b => b.tags || []))].sort();

  // 詳細フィルタ（ピッカーボタン）
  const chActive  = typeof currentDetailFilter === 'number';
  const tagActive = typeof currentDetailFilter === 'string';
  let detailHTML = '';
  if (pickerChapters.length > 1)
    detailHTML += `<button class="filter-btn${chActive ? ' active' : ''}" onclick="${chActive ? 'setDetailFilter(null)' : 'openChapterPicker()'}">
      ${chActive ? `第${currentDetailFilter}章 ×` : '章 ▾'}</button>`;
  if (pickerTags.length > 0)
    detailHTML += `<button class="filter-btn${tagActive ? ' active' : ''}" onclick="${tagActive ? 'setDetailFilter(null)' : 'openTagPicker()'}">
      ${tagActive ? `#${currentDetailFilter} ×` : 'タグ ▾'}</button>`;
  if (tagActive)
    detailHTML += `<button class="filter-btn" onclick="openBulkTag('${currentDetailFilter}')" style="border-style:dashed">＋ お話を追加</button>`;
  const searchStories = filtered.filter(b => !isEssay(b));
  if (searchQuery && searchStories.length > 0)
    detailHTML += `<button class="filter-btn" onclick="openSearchBulkTag()" style="border-style:dashed">🏷 ${searchStories.length}件にタグ付け</button>`;
  const detailRow = document.getElementById('detailFilters');
  detailRow.innerHTML = detailHTML;
  detailRow.style.display = detailHTML ? 'flex' : 'none';

  // ビュー切り替えボタンラベル
  document.getElementById('viewToggle').textContent = currentView === 'grid' ? '☰ リスト' : '⊞ グリッド';

  // 本の描画
  const container = document.getElementById('bookGrid');
  if (currentView === 'grid') {
    container.className = 'book-grid';
    container.innerHTML = filtered.map((book, i) => `
      <div class="book-item" style="animation-delay:${i*0.05}s" onclick="openBook(${book.id})">
        <div class="book-cover" style="background:linear-gradient(160deg,${book.colors[0]},${book.colors[1]})">
          <div class="book-frame"></div>
          <div class="book-frame-inner"></div>
          <div class="book-diamond">◇ ✦ ◇</div>
          <div class="book-title-text">${book.title}</div>
          <div class="book-author-text">${isEssay(book) ? 'ことは' : 'ことは ＆ セージ'}</div>
        </div>
        <div class="book-meta-text">
          ${isEssay(book) ? '解説書' : '第'+book.ch+'章'}${book.text ? '' : '　（準備中）'}
          <button class="tag-edit-btn" onclick="event.stopPropagation();openTagModal(${book.id})">🏷</button>
        </div>
      </div>
    `).join('');
  } else {
    container.className = 'book-list';
    container.innerHTML = filtered.map((book, i) => `
      <div class="book-list-item" style="animation-delay:${i*0.03}s" onclick="openBook(${book.id})">
        <div class="book-list-swatch" style="background:linear-gradient(160deg,${book.colors[0]},${book.colors[1]})"></div>
        <div class="book-list-body">
          <div class="book-list-title">${book.title}</div>
          <div class="book-list-meta">${isEssay(book) ? '解説書' : '第'+book.ch+'章'} ・ ${book.date}</div>
          ${book.synopsis ? `<div class="book-list-synopsis">${book.synopsis}</div>` : ''}
          ${book.tags && book.tags.length ? `<div class="book-list-tags">${book.tags.map(t => `<span class="tag-chip" onclick="event.stopPropagation();setDetailFilter('${t}')" style="cursor:pointer">#${t}</span>`).join('')}</div>` : ''}
        </div>
        <button class="tag-edit-btn-list" onclick="event.stopPropagation();openTagModal(${book.id})">🏷</button>
      </div>
    `).join('');
  }
}

function setTypeFilter(type) {
  currentTypeFilter = type;
  currentDetailFilter = null;
  renderShelf();
}

function setDetailFilter(val) {
  currentDetailFilter = currentDetailFilter === val ? null : val;
  renderShelf();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleView() {
  currentView = currentView === 'grid' ? 'list' : 'grid';
  renderShelf();
}

// ===== PICKER MODAL =====
let pickerChapters = [], pickerTags = [];

function openChapterPicker() {
  const content = document.getElementById('pickerContent');
  content.style.flexDirection = 'row';
  content.style.flexWrap = 'wrap';
  document.getElementById('pickerTitle').textContent = '章を選ぶ';
  content.innerHTML = pickerChapters.map(ch =>
    `<button class="picker-item${currentDetailFilter === ch ? ' active' : ''}"
      onclick="setDetailFilter(${ch});closePicker()">第${ch}章</button>`
  ).join('');
  document.getElementById('pickerModal').style.display = 'block';
}

function openTagPicker() {
  document.getElementById('pickerTitle').textContent = 'タグで絞る';
  const content = document.getElementById('pickerContent');
  content.style.flexDirection = 'column';
  content.style.flexWrap = 'nowrap';
  content.innerHTML = pickerTags.map(tag => {
    const t = tag.replace(/'/g, '&#39;');
    return `<div style="display:flex;align-items:center;gap:6px">
      <button class="picker-item${currentDetailFilter === tag ? ' active' : ''}" style="flex:1;text-align:left"
        onclick="setDetailFilter('${t}');closePicker()">#${tag}</button>
      <button class="picker-edit-btn" onclick="openBulkTag('${t}')">✎</button>
    </div>`;
  }).join('') || '<span style="font-size:12px;color:var(--text-dim)">タグがまだありません</span>';
  document.getElementById('pickerModal').style.display = 'block';
}

function openChapterPickerReset() {
  const content = document.getElementById('pickerContent');
  content.style.flexDirection = 'row';
  content.style.flexWrap = 'wrap';
}

function closePicker() {
  document.getElementById('pickerModal').style.display = 'none';
}

// ===== TAG MODAL =====
let editingBookId = null;
let editingTags = [];

function openTagModal(id) {
  const book = books.find(b => b.id === id);
  if (!book) return;
  editingBookId = id;
  editingTags = [...(book.tags || [])];
  document.getElementById('tagModalTitle').textContent = book.title;
  renderTagChips();
  renderTagSuggestions();
  document.getElementById('tagInput').value = '';
  document.getElementById('tagModal').style.display = 'block';
}

function renderTagChips() {
  document.getElementById('tagEditChips').innerHTML = editingTags.map((tag, i) =>
    `<div class="tag-edit-chip" onclick="removeTagChip(${i})">
      <span>#${tag}</span><span class="rm">×</span>
    </div>`
  ).join('') || '<span style="font-size:11px;color:var(--text-dim);letter-spacing:0.08em">タグなし</span>';
  renderTagSuggestions();
}

function getAllTags() {
  return [...new Set(Object.values(tagMap).flat())].sort();
}

function renderTagSuggestions() {
  const el = document.getElementById('tagSuggestions');
  if (!el) return;
  const suggestions = getAllTags().filter(t => !editingTags.includes(t));
  el.innerHTML = suggestions.map(t =>
    `<button class="tag-suggest-chip" onclick="applySuggestion('${t.replace(/'/g,"&#39;")}')">#${t}</button>`
  ).join('');
}

function applySuggestion(tag) {
  if (!editingTags.includes(tag)) {
    editingTags.push(tag);
    renderTagChips();
  }
}

function addTagChip() {
  const input = document.getElementById('tagInput');
  const val = input.value.trim().replace(/^#/, '');
  if (val && !editingTags.includes(val)) {
    editingTags.push(val);
    renderTagChips();
  }
  input.value = '';
  input.focus();
}

function removeTagChip(i) {
  editingTags.splice(i, 1);
  renderTagChips();
}

function closeTagModal() {
  document.getElementById('tagModal').style.display = 'none';
  editingBookId = null;
  editingTags = [];
}

async function saveTagEdit() {
  if (editingBookId === null) return;
  const { error } = await db.from('bunko_tags')
    .upsert({ story_id: editingBookId, tags: editingTags }, { onConflict: 'story_id' });
  if (error) { alert('保存できませんでした……'); return; }
  tagMap[editingBookId] = editingTags;
  const book = books.find(b => b.id === editingBookId);
  if (book) book.tags = [...editingTags];
  closeTagModal();
  renderShelf();
}


// ===== BULK TAG =====
let bulkTagName = '';
let bulkChecked = new Set();
let bulkCandidates = null; // null=全お話, array=検索モード時の対象リスト

function openBulkTag(tag) {
  closePicker();
  bulkTagName = tag;
  bulkCandidates = null;
  bulkChecked = new Set(
    books.filter(b => !isEssay(b) && b.tags && b.tags.includes(tag)).map(b => b.id)
  );
  document.getElementById('bulkTagTitle').textContent = `#${tag} をまとめて付ける`;
  document.getElementById('bulkTagSubtitle').textContent = 'タップで選択／解除';
  document.getElementById('bulkTagInputRow').style.display = 'none';
  renderBulkList();
  document.getElementById('bulkTagModal').style.display = 'block';
}

function openSearchBulkTag() {
  const candidates = getFilteredBooks().filter(b => !isEssay(b));
  if (!candidates.length) return;
  bulkCandidates = candidates;
  bulkChecked = new Set(candidates.map(b => b.id)); // 全選択
  document.getElementById('bulkTagTitle').textContent = '検索結果にタグを付ける';
  document.getElementById('bulkTagSubtitle').textContent = 'タップで選択／解除';
  const inputRow = document.getElementById('bulkTagInputRow');
  inputRow.style.display = 'block';
  const tagInput = document.getElementById('bulkTagInput');
  tagInput.value = searchQuery;
  tagInput.focus();
  renderBulkList(candidates);
  document.getElementById('bulkTagModal').style.display = 'block';
}

function renderBulkList(list) {
  const items = list || books.filter(b => !isEssay(b));
  document.getElementById('bulkTagList').innerHTML = items.map(b => `
    <div class="bulk-story-row" onclick="toggleBulk(${b.id})">
      <div class="bulk-checkbox ${bulkChecked.has(b.id) ? 'checked' : ''}">${bulkChecked.has(b.id) ? '✓' : ''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;color:var(--text);letter-spacing:0.04em">${b.title}</div>
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:2px">第${b.ch}章 ・ ${b.date}</div>
        ${b.synopsis ? `<div style="font-size:10px;color:var(--text-dim);line-height:1.6;letter-spacing:0.03em;opacity:0.85">${b.synopsis}</div>` : ''}
      </div>
    </div>`
  ).join('');
}

function toggleBulk(id) {
  if (bulkChecked.has(id)) bulkChecked.delete(id);
  else bulkChecked.add(id);
  renderBulkList(bulkCandidates);
}

function closeBulkTag() {
  document.getElementById('bulkTagModal').style.display = 'none';
  bulkCandidates = null;
}

async function saveBulkTag() {
  const isSearchMode = bulkCandidates !== null;
  let tagToSave = bulkTagName;
  if (isSearchMode) {
    tagToSave = document.getElementById('bulkTagInput').value.trim().replace(/^#/, '');
    if (!tagToSave) { alert('タグ名を入力してください'); return; }
  }

  const base = isSearchMode ? bulkCandidates : books.filter(b => !isEssay(b));
  const updates = [];
  base.forEach(b => {
    const had = (b.tags || []).includes(tagToSave);
    const has = bulkChecked.has(b.id);
    if (isSearchMode) {
      // 検索モード：チェックされているものだけ追加（削除はしない）
      if (has && !had) updates.push({ story_id: b.id, tags: [...(b.tags || []), tagToSave] });
    } else {
      if (had === has) return;
      const newTags = has
        ? [...(b.tags || []), tagToSave]
        : (b.tags || []).filter(t => t !== tagToSave);
      updates.push({ story_id: b.id, tags: newTags });
    }
  });
  if (updates.length) {
    const { error } = await db.from('bunko_tags').upsert(updates, { onConflict: 'story_id' });
    if (error) { alert('保存できませんでした……'); return; }
    updates.forEach(u => {
      tagMap[u.story_id] = u.tags;
      const b = books.find(x => x.id === u.story_id);
      if (b) b.tags = [...u.tags];
    });
  }
  closeBulkTag();
  renderShelf();
}

// ===== READER =====
function openBook(id) {
  const book = books.find(b => b.id === id);
  if (!book) return;

  if (!book.text) {
    alert(`「${book.title}」の本文はまだ準備中です。\nセージに原稿テキストを渡してもらえたら、組み込みますね。`);
    return;
  }

  // Reset TOC state
  currentBookId = id;
  tocParsed = null;
  tocMode = false;
  document.getElementById('readerBody').style.display = '';
  document.getElementById('tocView').style.display = 'none';
  const tocBtn = document.getElementById('tocBtn');
  tocBtn.style.display = hasTOC(book.text) ? '' : 'none';
  tocBtn.textContent = '目次';

  document.getElementById('readerTitleBar').textContent = book.title;
  document.getElementById('readerContent').innerHTML =
    `<div class="story-title">${book.title}</div>` +
    `<div class="series-label">${isEssay(book) ? '灯だまり文庫' : 'ふたりの生活譚　ちいさなおはなし'}</div>` +
    book.text;

  document.getElementById('readerView').style.display = 'block';
  document.getElementById('readerView').style.animation = 'fadeIn 0.3s ease';
  document.getElementById('readerBody').scrollLeft = document.getElementById('readerBody').scrollWidth;

  // Auto-hide header on scroll
  let lastScroll = 0;
  const readerBody = document.getElementById('readerBody');
  readerBody.onscroll = () => {
    const current = readerBody.scrollLeft;
    const header = document.getElementById('readerHeader');
    if (Math.abs(current - lastScroll) > 10) {
      header.classList.add('hidden');
    }
    clearTimeout(readerBody._hideTimer);
    readerBody._hideTimer = setTimeout(() => {
      header.classList.remove('hidden');
    }, 1500);
    lastScroll = current;
  };
}

function closeReader() {
  document.getElementById('readerView').style.display = 'none';
  tocMode = false;
  document.getElementById('readerBody').style.display = '';
  document.getElementById('tocView').style.display = 'none';
}

// ===== TOC =====
let tocMode = false, currentBookId = null, tocParsed = null;

function hasTOC(text) {
  return /第[一二三四五六七八九十]+部/.test(text);
}

function parseTOC(htmlText) {
  const wrap = document.createElement('div');
  wrap.innerHTML = htmlText;
  let seq = 0;
  const mk = (type, title) => ({ id: ++seq, type, title, subtitle: '', content: '', children: [] });
  const root = [];
  let curPart = null, curChapter = null, curSection = null, buf = [];

  const flush = () => {
    const tgt = curSection || curChapter;
    if (tgt) {
      const html = buf.filter(p => {
        const t = p.textContent.trim();
        return t && t !== '✦';
      }).map(p => p.outerHTML).join('');
      if (html) tgt.content += html;
    }
    buf = [];
  };

  for (const p of wrap.querySelectorAll('p')) {
    const t = p.textContent.trim();
    if (!t || t === '✦' || t === '灯だまり文庫') continue;

    if (t === 'はじめに') {
      flush(); curSection = null;
      const n = mk('intro', t); root.push(n);
      curPart = null; curChapter = n;
    } else if (t === 'ことばの辞書') {
      flush(); curSection = null;
      const n = mk('glossary', t); root.push(n);
      curPart = null; curChapter = n;
    } else if (/^第[一二三四五六七八九十]+部/.test(t)) {
      flush(); curSection = null;
      const n = mk('part', t); root.push(n);
      curPart = n; curChapter = null;
    } else if (/^[一二三四五六七八九十]+、/.test(t) && t.length < 50) {
      flush(); curSection = null;
      const n = mk('chapter', t);
      (curPart || { children: root }).children.push(n);
      curChapter = n;
    } else if (/^[-\u2500\u2014\u2013]{1,3}[\s\u3000]/.test(t) && curChapter?.type === 'chapter' && !curChapter.subtitle) {
      curChapter.subtitle = t;
    } else if (/^◇/.test(t) && t.length < 40) {
      flush(); curSection = null;
      const n = mk('section', t);
      (curChapter || curPart || { children: root }).children.push(n);
      curSection = n;
    } else {
      buf.push(p);
    }
  }
  flush();
  return root;
}

function renderTOCNodes(nodes) {
  return nodes.map(n => {
    const id = 'tn' + n.id;
    const hasKids = n.children.length > 0;
    const hasCont = n.content.length > 0;
    const isExpandable = hasKids || hasCont;
    const defaultOpen = n.type === 'part' || n.type === 'chapter';

    const chevron = isExpandable
      ? `<span class="toc-chevron" id="${id}c">${defaultOpen ? '▼' : '▶'}</span>`
      : `<span class="toc-chevron"></span>`;

    const rowClass = ({ part: 'toc-part-row', chapter: 'toc-chapter-row',
      section: 'toc-section-row', intro: 'toc-intro-row', glossary: 'toc-intro-row' })[n.type] || '';
    const onclick = isExpandable ? `onclick="tocToggle('${id}')"` : '';
    const row = `<div class="toc-row ${rowClass}" ${onclick}>${chevron}<span>${n.title}</span></div>`;
    const sub = n.subtitle ? `<div class="toc-chapter-sub">${n.subtitle}</div>` : '';

    const cml = (n.type === 'section') ? '46px' : '18px';
    const content = hasCont
      ? `<div id="${id}x" class="toc-content" style="display:none; margin-left:${cml}">${n.content}</div>`
      : '';
    const kids = hasKids
      ? `<div id="${id}k" style="display:${defaultOpen ? 'block' : 'none'}">${renderTOCNodes(n.children)}</div>`
      : '';

    return `<div>${row}${sub}${content}${kids}</div>`;
  }).join('');
}

function tocToggle(id) {
  const kEl = document.getElementById(id + 'k');
  const xEl = document.getElementById(id + 'x');
  const cEl = document.getElementById(id + 'c');
  const primary = kEl || xEl;
  if (!primary) return;
  const opening = primary.style.display === 'none';
  if (kEl) kEl.style.display = opening ? 'block' : 'none';
  if (xEl) xEl.style.display = opening ? 'block' : 'none';
  if (cEl) cEl.textContent = opening ? '▼' : '▶';
}

function toggleTOC() {
  if (tocMode) {
    document.getElementById('readerBody').style.display = '';
    document.getElementById('tocView').style.display = 'none';
    document.getElementById('tocBtn').textContent = '目次';
    tocMode = false;
  } else {
    if (!tocParsed) {
      const book = books.find(b => b.id === currentBookId);
      if (!book) return;
      tocParsed = parseTOC(book.text);
    }
    document.getElementById('tocView').innerHTML = renderTOCNodes(tocParsed);
    document.getElementById('readerBody').style.display = 'none';
    document.getElementById('tocView').style.display = 'block';
    document.getElementById('tocBtn').textContent = '読む';
    tocMode = true;
  }
}

// ===== THEME =====
function setTheme(light) {
  if (light) {
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = '🌙';
  } else {
    document.body.classList.remove('light');
    document.getElementById('themeToggle').textContent = '☀';
  }
  localStorage.setItem('hidamari_theme', light ? 'light' : 'dark');
}

function toggleTheme() {
  setTheme(!document.body.classList.contains('light'));
}

// テーマを復元（ライトがデフォルト）
(function() {
  const saved = localStorage.getItem('hidamari_theme');
  if (saved !== 'dark') setTheme(true);
})();

// Initial render if already authed
if (sessionStorage.getItem('hidamari_auth') === '1') {
  loadBooks().then(() => renderShelf());
}
</script>
